version: '3.8'

services:
  coral-automatic-segmentation-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: coral-automatic-segmentation-cpu
    container_name: coral-automatic-segmentation-cpu
    networks:
      - coral-network
    ports:
      - "7000:7000"
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://coral.ni.dfki.de,http://localhost:8000}
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 7000
